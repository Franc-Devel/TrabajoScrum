<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rolling NFT | Banner Profesional</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark"> 
    <section class="container mt-5 d-none d-lg-block">
        <div class="banner-mint-profesional position-relative overflow-hidden">            
            <div class="banner-bg-image"></div>            
            <div class="banner-content d-flex flex-column align-items-center justify-content-center text-center p-5">
                <span class="badge-mint mb-3">
                    <i class="bi bi-fire me-1"></i> MINT DISPONIBLE AHORA
                </span>                
                <h2 class="display-4 fw-bold mb-2">
                    Únete a la comunidad <span class="text-vibrant">Rolling NFT</span>
                </h2>                
                <p class="text-secondary mb-4 opacity-75">
                    Mint abierto por tiempo limitado. ¡No te quedes fuera!
                </p>                
                <button class="btn btn-primary-cyber px-5">
                    Mint ahora <i class="bi bi-send-fill ms-2"></i>
                </button>
            </div>            
        </div>
    </section>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
