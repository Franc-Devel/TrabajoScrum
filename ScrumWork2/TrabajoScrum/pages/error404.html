<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rolling NFT | Error 404</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <!-- Conectamos con el CSS principal -->
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body
    class="bg-dark d-flex flex-column min-vh-100 justify-content-center align-items-center position-relative overflow-hidden"
  >
    <!-- Efecto de luz de fondo para dar ambiente Cyberpunk -->
    <div
      style="
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 400px;
        height: 400px;
        background: var(--soft-violet);
        filter: blur(150px);
        opacity: 0.15;
        z-index: 0;
      "
    ></div>

    <div
      class="text-center p-5 rounded-4 position-relative"
      style="
        background-color: var(--dark-purple);
        border: 1px solid rgba(163, 137, 244, 0.3);
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        max-width: 600px;
        width: 90%;
        z-index: 1;
      "
    >
      <span
        class="badge-mint mb-3"
        style="
          border-color: #ff4d4d;
          color: #ff4d4d;
          background: rgba(255, 77, 77, 0.1);
        "
      >
        <i class="bi bi-exclamation-triangle-fill me-1"></i> ERROR DEL SISTEMA
      </span>

      <!-- El 404 gigante con efecto de brillo -->
      <h1
        class="fw-bold mb-0"
        style="
          font-size: 7rem;
          color: var(--text-primary);
          text-shadow: 0 0 25px rgba(209, 139, 255, 0.6);
          line-height: 1;
        "
      >
        404
      </h1>

      <h2 class="h3 fw-bold text-white mb-3 mt-2">
        Glitch en la <span class="text-vibrant">Matrix</span>
      </h2>

      <p class="text-secondary mb-5 px-md-4">
        Parece que este NFT se perdió en la blockchain o la ruta que buscás no
        existe. Regresemos a la base de operaciones antes de que colapse el
        servidor.
      </p>

      <!-- Botón para volver a la landing -->
      <a href="../index.html" class="btn btn-primary-cyber px-5 py-3">
        Abortar y Volver al Inicio <i class="bi bi-arrow-return-left ms-2"></i>
      </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
